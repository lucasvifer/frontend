<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <title>Calculadora 1.0</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" href="resources/fv.ico"/>
</head>
<body>
    <h1>Calculadora 1.0</h1>
    <div class="calc-container">
    <input type="number" id="n1" placeholder="Numero 1:"/>
    <select id="operacion">
        <option value="suma">+</option>
        <option value="resta">-</option>
        <option value="multiplicacion">×</option>
        <option value="division">÷</option>
    </select>
    <input type="number" id="n2" placeholder="Numero 2"/>
    <button id="igual">=</button>
    <input type="text" id="resultado" readonly/></div>


</body>
<script src="script.js"></script>
</html>
