<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <title>Ventas</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <table id="Ventas">
            <tr class="center">
                <th colspan="4">Detalle de venta-Factura #0001</th>
            </tr>
            <tr class="centrado">
                <td>Producto</td>
                <td>Cantidad</td>
                <td>Precio u.</td>
                <td>Subtotal</td>
            </tr>
            <tr class="i1">
                <td>Remera Blanca</td>
                <td class="center">2</td>
                <td class="right">85.000</td>
                <td class="right">170.000</td>
            </tr>
             <tr class="i2">
                <td>Mochila Negra</td>
                <td class="center">1</td>
                <td class="right">320.000</td>
                <td class="right">320.000</td>
            </tr>

            <tr class="i3">
                <td rowspan="2" class="totl">Totales</td>
                <td colspan="2" class="rh">IVA (10%)</td>
                <td class="rh2">49.000</td>
            </tr>
            <tr class="i4">
                <td colspan="2" class="center">Total</td>
                <td class="right">539.000</td>
            </tr>
        </table>
    </body>
</html>
